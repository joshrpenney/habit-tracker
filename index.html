<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Habit Tracker</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<header>

<div>

<h1>🔥 Habit Tracker</h1>

<p class="subtitle">
Build yourself every day.
</p>

</div>

<a href="settings.html"
class="settings">

⚙️

</a>

</header>

<section class="hero">

<div class="xp-ring">

<div class="xp-inner">

<h2 id="level">

Level 1

</h2>

<p id="xp">

0 XP

</p>

</div>

</div>

<div class="streak-card">

<h2 id="streak">

🔥 0 Day Streak

</h2>

<p id="longest">

🏆 Longest: 0 Days

</p>

</div>

</section>

<section>

<h2>

Today's Habits

</h2>

<div id="habitList">

</div>

</section>

<section>

<h2>

Today's Tasks

</h2>

<div id="taskList">

</div>

</section>

<section>

<h2>

Weekly Goals

</h2>

<div id="goalList">

</div>

</section>

<button
class="floating-add"
onclick="location.href='settings.html'">

+

</button>

</div>

<script src="script.js"></script>

</body>

</html>
